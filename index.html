<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple Words</title>
    
    <link rel="icon" href="image_38.png">
    <link rel="apple-touch-icon" href="image_38.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --highlight: #e3f2fd;
            --radius: 15px;
        }

        /* 憲法遵守: 角丸15px / iOS Safari対策 / 全域選択禁止 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        textarea { -webkit-user-select: text; user-select: text; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; }

        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 14px;
            border-radius: var(--radius);
        }

        .subtitle { font-size: 0.9rem; color: #666; font-weight: 700; text-align: left; }

        .switcher {
            display: flex;
            background: var(--input-bg);
            padding: 5px;
            border-radius: var(--radius);
            gap: 5px;
            border: 2px solid var(--accent);
        }

        .sw-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            color: #888;
        }

        .sw-btn.active { background: #fff; color: var(--main); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .input-card {
            background: var(--input-bg);
            padding: 18px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            position: relative;
        }

        .input-wrapper { position: relative; }

        textarea {
            width: 100%; height: 150px; padding: 15px; padding-right: 40px;
            border: 2px solid var(--accent); border-radius: var(--radius);
            background: #fff; font-size: 1rem; font-weight: 600;
            color: var(--main) !important; outline: none; resize: none;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main) !important; opacity: 1 !important;
        }
        textarea::placeholder { color: #bbb !important; -webkit-text-fill-color: #bbb !important; opacity: 1 !important; }

        .clr-btn {
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
            background: #ccc; color: #fff; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 16px; font-weight: bold; z-index: 5;
        }

        .action-btn {
            width: 100%; padding: 18px; background: var(--main); color: #fff;
            border: none; border-radius: var(--radius); font-size: 1rem;
            font-weight: 800; cursor: pointer; -webkit-text-fill-color: #fff;
        }
        .action-btn:active { transform: scale(0.98); }

        .output-box {
            width: 100%; min-height: 80px; padding: 18px; background: var(--input-bg);
            border: 2px solid var(--accent); border-radius: var(--radius);
            font-size: 1rem; line-height: 1.6; white-space: pre-wrap;
            display: none; font-weight: 600; color: var(--main);
        }
        .output-box.show { display: block; }
        
        mark { 
            background-color: var(--highlight); color: #0277bd; 
            border-radius: 4px; padding: 0 2px; cursor: pointer;
            transition: 0.1s;
        }

        .stat-bar {
            display: none; justify-content: flex-end; font-size: 0.75rem;
            font-weight: 800; color: #999; margin-top: -10px; padding: 0 5px;
        }
        .stat-bar.show { display: flex; }

        .copy-btn {
            width: 100%; padding: 15px; background: var(--accent); color: var(--main);
            border: none; border-radius: var(--radius); font-size: 0.9rem;
            font-weight: 800; cursor: pointer; display: none;
        }
        .copy-btn.show { display: block; }

        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .kofi-btn {
            background: var(--main); color: #fff; text-decoration: none;
            padding: 16px; border-radius: var(--radius); text-align: center;
            font-weight: 900; font-size: 0.9rem; -webkit-text-fill-color: #fff;
        }
        .home-btn {
            background: var(--accent); color: var(--main); border: none;
            padding: 12px; border-radius: var(--radius); font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }

        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 340px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Simple Words</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p id="desc" class="subtitle">Make your text easier for everyone.</p>

    <div class="switcher">
        <button id="btn-en" class="sw-btn active" onclick="setLang('en')">English</button>
        <button id="btn-jp" class="sw-btn" onclick="setLang('jp')">日本語</button>
    </div>

    <div class="input-card">
        <div class="input-wrapper">
            <textarea id="input" placeholder="Paste your text here..." oninput="toggleClr()"></textarea>
            <button class="clr-btn" id="clrBtn" onclick="clearInput()">×</button>
        </div>
    </div>
    
    <button class="action-btn" onclick="simplify()">MAKE IT SIMPLE</button>

    <div id="output" class="output-box"></div>
    <div id="statBar" class="stat-bar"></div>
    <button id="copy-btn" class="copy-btn" onclick="copyResult()">COPY RESULT</button>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️ buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen<br><br>
            🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen
        </p>
    </div>
</div>

<script>
    let currentLang = 'en';

    const dict = {
        en: {
            "in accordance with": "following", "due to the fact that": "because", "prior to": "before", "with regard to": "about",
            "at this point in time": "now", "on a regular basis": "regularly", "take into consideration": "consider", "a large number of": "many",
            "for the purpose of": "to", "in the event that": "if", "notwithstanding the fact that": "although", "it is imperative that": "must",
            "utilize": "use", "subsequent": "next", "terminate": "stop", "commence": "start", "optimal": "best", "approximately": "about",
            "assistance": "help", "sufficient": "enough", "additional": "more", "purchase": "buy", "require": "need", "obtain": "get",
            "demonstrate": "show", "implement": "do", "objective": "goal", "facilitate": "help", "fundamental": "basic", "magnitude": "size",
            "furthermore": "also", "nevertheless": "but", "therefore": "so", "consequently": "so", "substantially": "much", "advantageous": "helpful",
            "discontinue": "stop", "endeavor": "try", "execute": "do", "finalize": "finish", "initiate": "start", "modify": "change", 
            "notification": "message", "parameters": "limits", "pertaining to": "about", "provide": "give", "regarding": "about",
            "remuneration": "pay", "requirement": "need", "stipulate": "say", "subsequently": "later", "unavailable": "not here", "verification": "check"
        },
        jp: {
            "何卒よろしくお願い申し上げます": "よろしくお願いします", "可及的速やかに": "なるべく早く", "ご査収ください": "ご確認ください",
            "ご自愛ください": "お体に気をつけて", "相違ありません": "間違いありません", "遵守事項": "守るべきルール",
            "喫緊の課題": "今すぐやるべきこと", "左記の通り": "こちらに書いた通り", "上記の通り": "上に書いた通り", "ご教示いただけますと幸いです": "教えてください",
            "ご検討いただけますと幸いです": "考えてみてください", "お含みおきください": "覚えておいてください", "拝承いたしました": "わかりました", 
            "承知いたしました": "わかりました", "失念しておりました": "忘れていました", "瑕疵": "キズやミス", "是正": "なおす", 
            "補填": "うめ合わせ", "齟齬": "くい違い", "進捗": "進みぐあい", "遵守": "守ること", "可視化": "見えるように",
            "アグリーメント": "合意", "フィジビリティ": "実現できるかどうか", "エビデンス": "証拠", "コンセンサス": "同意", 
            "スキーム": "計画", "バッファ": "余裕", "リスケ": "予定変更", "アサイン": "割り当て", "ナレッジ": "知識", 
            "ブラッシュアップ": "磨き上げ", "ペンディング": "保留", "コミット": "約束", "シナジー": "相乗効果", 
            "ステークホルダー": "関係者", "リソース": "人手や時間", "ワークフロー": "作業手順", "イニシアチブ": "主導権", 
            "プライオリティ": "優先順位", "ベネフィット": "利益", "ボトルネック": "詰まっている所", "マネタイズ": "収益化", 
            "ソリューション": "解決策", "アウトプット": "成果物", "アジェンダ": "会議の項目", "インセンティブ": "報酬", 
            "デッドライン": "期限", "フィードバック": "意見", "マイルストーン": "節目", "ローンチ": "公開"
        }
    };

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.sw-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${lang}`));
        const input = document.getElementById('input');
        const desc = document.getElementById('desc');
        if(lang === 'jp') {
            input.placeholder = "ここに文章を貼り付けてください...";
            desc.innerText = "12歳でもわかる平易な表現に変換します。";
        } else {
            input.placeholder = "Paste your text here...";
            desc.innerText = "Make your text easier for everyone.";
        }
    }

    function toggleClr() {
        document.getElementById('clrBtn').style.display = document.getElementById('input').value.length > 0 ? 'flex' : 'none';
    }

    function clearInput() {
        document.getElementById('input').value = "";
        document.getElementById('output').classList.remove('show');
        document.getElementById('statBar').classList.remove('show');
        document.getElementById('copy-btn').classList.remove('show');
        toggleClr();
        document.getElementById('input').focus();
    }

    function simplify() {
        const input = document.getElementById('input').value;
        if(!input) return;
        
        let result = input;
        const currentDict = dict[currentLang];
        const keys = Object.keys(currentDict).sort((a, b) => b.length - a.length);
        
        const placeholders = [];
        
        keys.forEach((key, idx) => {
            const regex = new RegExp(key, 'gi');
            result = result.replace(regex, (matched) => {
                const ph = `__PH${idx}__`;
                placeholders[idx] = {
                    orig: matched,
                    simple: currentDict[key]
                };
                return ph;
            });
        });

        for(let i=0; i < keys.length; i++) {
            if (!placeholders[i]) continue;
            const phRegex = new RegExp(`__PH${i}__`, 'g');
            result = result.replace(phRegex, `<mark data-orig="${placeholders[i].orig}" onclick="toggleTerm(this)">${placeholders[i].simple}</mark>`);
        }

        const output = document.getElementById('output');
        output.innerHTML = result;
        output.classList.add('show');
        
        updateStats();

        document.getElementById('copy-btn').classList.add('show');
        document.getElementById('copy-btn').innerText = "COPY RESULT";
        
        window.scrollTo({ top: output.offsetTop - 20, behavior: 'smooth' });
    }

    function toggleTerm(el) {
        const currentText = el.innerText;
        const origText = el.getAttribute('data-orig');
        el.innerText = origText;
        el.setAttribute('data-orig', currentText);
        el.style.backgroundColor = el.style.backgroundColor === 'rgb(238, 238, 238)' ? '' : '#eee';
        updateStats();
    }

    function updateStats() {
        const beforeLen = document.getElementById('input').value.length;
        const afterLen = document.getElementById('output').innerText.length;
        const diff = afterLen - beforeLen;
        const statBar = document.getElementById('statBar');
        statBar.innerText = `${beforeLen} → ${afterLen} chars ( ${diff > 0 ? '+' : ''}${diff} )`;
        statBar.classList.add('show');
    }

    function copyResult() {
        const output = document.getElementById('output');
        const btn = document.getElementById('copy-btn');
        navigator.clipboard.writeText(output.innerText).then(() => {
            btn.innerText = "COPIED!";
            setTimeout(() => { btn.innerText = "COPY RESULT"; }, 1500);
        });
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
